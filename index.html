<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fleet Mission Editor Skeleton</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
<div class="app">
  <header>
    <div>
      <span class="title">Fleet Mission Editor</span>
      <span class="subtitle">모드론 1 + 자드론 4 mission editor</span>
    </div>
    <div class="toolbar">
      <button id="exportPackageBtn">Mission Package JSON 저장</button>
      <label class="file-label" for="importPackageInput">Mission Package 불러오기</label>
      <input id="importPackageInput" class="hidden" type="file" accept=".json,application/json" />
      <button id="resetBtn" class="danger">초기화</button>
    </div>
  </header>

  <div class="main">
    <aside>
      <div class="section">
        <h2>드론 선택</h2>
        <div id="droneList"></div>
      </div>

      <div class="section">
        <h2>연결 설정</h2>
        <div class="hint" style="margin-bottom: 10px;">
          이 스켈레톤은 브라우저 기반이라 실제 UDP 연결은 하지 않습니다. 여기서는 드론별 IP/Port/SYSID 설정을 mission package에 저장합니다.
        </div>
        <div class="grid2">
          <div><label>IP</label><input id="connIp" /></div>
          <div><label>UDP Port</label><input id="connPort" type="number" /></div>
        </div>
        <div class="grid2" style="margin-top:8px;">
          <div><label>SYSID</label><input id="connSysid" type="number" /></div>
          <div><label>역할</label><input id="connRole" disabled /></div>
        </div>
        <button id="saveConnBtn" style="width:100%; margin-top:10px;">연결 설정 저장</button>
      </div>

      <div class="section">
        <h2>QGC Plan 설정</h2>
        <div class="grid2">
          <div>
            <label>Firmware</label>
            <select id="firmwareType">
              <option value="12">PX4</option>
              <option value="3">ArduPilot</option>
            </select>
          </div>
          <div>
            <label>Vehicle</label>
            <select id="vehicleType">
              <option value="2">Multicopter</option>
              <option value="1">Fixed Wing</option>
              <option value="22">VTOL</option>
            </select>
          </div>
        </div>
        <div class="grid2" style="margin-top:8px;">
          <div><label>Hover Speed</label><input id="hoverSpeed" type="number" step="0.1" /></div>
          <div><label>Cruise Speed</label><input id="cruiseSpeed" type="number" step="0.1" /></div>
        </div>
        <div style="margin-top:8px;">
          <label><input id="useFirstAsTakeoff" type="checkbox" style="width:auto; vertical-align:middle;" checked /> 첫 waypoint를 TAKEOFF로 export</label>
        </div>
      </div>
    </aside>

    <main id="map"></main>

    <aside class="right">
      <div class="section">
        <h2>선택 드론 Mission</h2>
        <div class="grid3">
          <div><label>기본 고도 m</label><input id="defaultAlt" type="number" step="1" value="10" /></div>
          <div><label>WP 수</label><input id="wpCount" disabled /></div>
          <div><label>상태</label><input id="missionState" disabled /></div>
        </div>
        <div class="toolbar" style="margin-top:10px;">
          <button id="exportQgcBtn" class="primary">선택 드론 .plan 저장</button>
          <button id="clearMissionBtn">선택 드론 WP 삭제</button>
        </div>
      </div>

      <div class="section">
        <h2>Waypoint 목록</h2>
        <table class="wp-table">
          <thead>
            <tr>
              <th>#</th>
              <th>좌표</th>
              <th>고도</th>
              <th>Action</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="waypointRows"></tbody>
        </table>
        <div class="hint" style="margin-top:10px;">
          지도 클릭 시 선택된 드론에 waypoint가 추가됩니다. 첫 고도는 기본 고도, 이후는 직전 waypoint 고도를 상속합니다.
        </div>
      </div>

      <div class="section">
        <h2>Sanity Check</h2>
        <div id="sanityBox" class="status-box"></div>
      </div>
    </aside>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="./src/app.js"></script>
</body>
</html>
